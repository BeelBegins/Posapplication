name: Build Desktop and Android Release

env:
  AI_MATIC_PRODUCT: pos

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test

  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist-installer/
          if-no-files-found: error

  android:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - product: pos
            artifact: android-pos-release
            filename: Aimatic-POS-App
          - product: sales
            artifact: android-sales-release
            filename: Aimatic-Sales-App
          - product: shopping
            artifact: android-shopping-release
            filename: Aimatic-Shopping-App
    env:
      AI_MATIC_PRODUCT: ${{ matrix.product }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:sync
      - name: Restore Android release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "ANDROID_KEYSTORE_BASE64 secret is required" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "ANDROID_KEYSTORE_PASSWORD secret is required" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "ANDROID_KEY_ALIAS secret is required" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "ANDROID_KEY_PASSWORD secret is required" && exit 1)
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/aimatic-release.jks"
      - name: Build signed Android APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/aimatic-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - name: Name Android release artifact
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/release/app-release.apk "dist-apk/${{ matrix.filename }}-$VERSION.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-apk/
          if-no-files-found: error

  web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build:shopping:web
      - name: Package Shopping web build
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd dist-web/shopping
          zip -r "../Aimatic-Shopping-Web-$VERSION.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: shopping-web-release
          path: dist-web/Aimatic-Shopping-Web-*.zip
          if-no-files-found: error

  publish:
    needs: [windows, android, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist-installer
      - uses: actions/download-artifact@v4
        with:
          name: android-pos-release
          path: dist-apk
      - uses: actions/download-artifact@v4
        with:
          name: android-sales-release
          path: dist-apk
      - uses: actions/download-artifact@v4
        with:
          name: android-shopping-release
          path: dist-apk
      - uses: actions/download-artifact@v4
        with:
          name: shopping-web-release
          path: dist-web
      - name: Publish combined GitHub release
        run: node scripts/publish-github-release.cjs --require-product-apks --require-web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
