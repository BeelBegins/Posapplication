name: Build Windows Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (rebuilds better-sqlite3 for Electron via postinstall)
        run: npm ci

      - name: Compile TypeScript + copy renderer assets
        run: npm run build

      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --publish never

      - name: Publish GitHub release
        run: node scripts/publish-github-release.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
